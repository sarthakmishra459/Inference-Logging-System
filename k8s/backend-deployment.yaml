apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-logging-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-logging-backend
  template:
    metadata:
      labels:
        app: inference-logging-backend
    spec:
      containers:
        - name: backend
          image: your-registry/inference-logging-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: inference-logging-backend-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: inference-logging-backend
spec:
  selector:
    app: inference-logging-backend
  ports:
    - port: 80
      targetPort: 8000
