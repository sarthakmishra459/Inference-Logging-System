apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-logging-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-logging-frontend
  template:
    metadata:
      labels:
        app: inference-logging-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/inference-logging-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: https://api.example.com
---
apiVersion: v1
kind: Service
metadata:
  name: inference-logging-frontend
spec:
  selector:
    app: inference-logging-frontend
  ports:
    - port: 80
      targetPort: 3000
